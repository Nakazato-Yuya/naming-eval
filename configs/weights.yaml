---
# ==================================================
# 3軸フレームワーク設定（phonology.py が読み込む）
# ==================================================
phonology_weights:
  # 軸A: 発音容易性（高いほど発音しやすい [0,1]）
  axis_a:
    a_len:  0.35    # モーラ長さ適合（最適2〜4モーラで1.0）
    a_open: 0.30    # 開音節比率（ーも開音節扱い）
    a_sp:   0.20    # 閉鎖特殊モーラ少なさ（ン・ッのみ、ー除外）
    a_yoon: 0.15    # 拗音の少なさ

  # 軸B: 記憶容易性（高いほど覚えやすい [0,1]）
  axis_b:
    b_rhythm: 0.50  # リズム規則性（隣接同一母音比）
    b_vowel:  0.50  # 母音調和度（前舌/後舌への偏り）

  # 軸間ウェイト（将来の FinalScore 合成用）
  axis_weights:
    axis_a: 0.70
    axis_b: 0.30

  # a_len ガウス関数パラメータ
  a_len_params:
    mu_lo: 2      # 最適モーラ下限
    mu_hi: 4      # 最適モーラ上限
    sigma: 2.0    # ガウス幅

# ==================================================
# 後方互換セクション（src/features/epi.py シムが読む）
# ==================================================
epi_weights:
  f_len:  0.35    # 旧 0.18 → a_len の重みに揃えた
  f_open: 0.30    # 旧 0.16
  f_sp:   0.20    # 旧 0.16（ー除外後の新 a_sp 定義）
  f_yoon: 0.15    # 旧 0.12

# ==================================================
# 以下は既存セクション（変更なし）
# ==================================================
final_params:
  gamma: 0.5
  delta: 2.0
  lambda: 0.1

csai_params:
  eta: 0.5
  sigma: 3

ur_thresholds:
  red_quantile: 0.90
  yellow_quantile: 0.75
